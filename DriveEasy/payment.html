<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - Car Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-semibold mb-4">Secure Payment</h2>
        <div id="carDetails" class="mb-4 p-4 border rounded bg-gray-50">
            <h3 class="font-semibold">Selected Car Details:</h3>
            <p id="carName" class="text-gray-700">Car Name: </p>
            <p id="carPrice" class="text-gray-700">Price: </p>
        </div>
        
        <label class="block mb-2">Payment Method:</label>
        <select id="paymentMethod" class="w-full p-2 border rounded mb-4" onchange="togglePaymentMethod()">
            <option value="card">Credit/Debit Card</option>
            <option value="upi">UPI</option>
            <option value="netbanking">Net Banking</option>
        </select>
        
        <div id="cardDetails" class="mb-4">
            <label class="block mb-2">Card Number:</label>
            <input type="text" id="cardNumber" class="w-full p-2 border rounded mb-4" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19">
            <label class="block mb-2">Expiry Date:</label>
            <input type="text" id="expiryDate" class="w-full p-2 border rounded mb-4" placeholder="MM/YY" maxlength="5">
            <label class="block mb-2">CVV:</label>
            <input type="password" id="cvv" class="w-full p-2 border rounded mb-4" placeholder="XXX" maxlength="3">
        </div>
        
        <div id="upiDetails" class="mb-4 hidden">
            <p class="text-gray-700 mb-2">Scan the QR Code to Pay:</p>
            <canvas id="upiQr" class="border p-2 mx-auto"></canvas>
        </div>
        
        <div id="netbankingDetails" class="mb-4 hidden">
            <label class="block mb-2">Select Your Bank:</label>
            <select id="bankSelect" class="w-full p-2 border rounded mb-4">
                <option value="sbi">State Bank of India</option>
                <option value="hdfc">HDFC Bank</option>
                <option value="icici">ICICI Bank</option>
                <option value="axis">Axis Bank</option>
            </select>
            <button type="button" onclick="proceedToBank()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Proceed to Bank</button>
        </div>
        
        <button type="button" onclick="processPayment()" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">Pay Now</button>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const params = new URLSearchParams(window.location.search);
            document.getElementById("carName").textContent = "Car Name: " + (params.get("carName") || "Unknown");
            document.getElementById("carPrice").textContent = "Price: " + (params.get("carPrice") || "Unknown");
            generateQrCode();
        });
        
        function togglePaymentMethod() {
            const method = document.getElementById("paymentMethod").value;
            document.getElementById("cardDetails").classList.toggle("hidden", method !== "card");
            document.getElementById("upiDetails").classList.toggle("hidden", method !== "upi");
            document.getElementById("netbankingDetails").classList.toggle("hidden", method !== "netbanking");
        }
        
        function generateQrCode() {
            const qr = new QRious({
                element: document.getElementById("upiQr"),
                value: "upi://pay?pa=example@upi&pn=CarRental&mc=1234&tid=9876543210&tr=123456789&tn=Car%20Rental%20Payment&am=100&cu=INR",
                size: 200
            });
        }
        
        function proceedToBank() {
            alert("Redirecting to your bank's net banking portal...");
        }
        
        function processPayment() {
            alert("Payment Processed Successfully!");
            window.location.href = "invoice2.html";
        }
    </script>
</body>
</html>
