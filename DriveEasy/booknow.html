<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now - Car Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-semibold mb-4">Car Booking</h2>
        <form id="bookingForm">
            <label class="block mb-2">Full Name:</label>
            <input type="text" id="fullName" class="w-full p-2 border rounded mb-4" placeholder="Enter your name" required>
            
            <label class="block mb-2">Email:</label>
            <input type="email" id="email" class="w-full p-2 border rounded mb-4" placeholder="Enter your email" required>
            
            <label class="block mb-2">Phone Number:</label>
            <input type="tel" id="phone" class="w-full p-2 border rounded mb-4" placeholder="Enter your phone number" required>
            
            <label class="block mb-2">Pickup Location:</label>
            <select id="pickupLocation" class="w-full p-2 border rounded mb-4" required>
                <option value="">Select Pickup Location</option>
                <option value="City Airport">City Airport</option>
                <option value="City Railway Station">City Railway Station</option>
                <option value="City Office">City Office</option>
            </select>
            
            <label class="block mb-2">Drop Location:</label>
            <select id="dropLocation" class="w-full p-2 border rounded mb-4" required>
                <option value="">Select Drop Location</option>
                <option value="City Airport">City Airport</option>
                <option value="City Railway Station">City Railway Station</option>
                <option value="City Office">City Office</option>
            </select>
            
            <label class="block mb-2">Pickup Date & Time:</label>
            <input type="datetime-local" id="pickupDateTime" class="w-full p-2 border rounded mb-4" required>
            
            <label class="block mb-2">Drop-off Date & Time:</label>
            <input type="datetime-local" id="dropDateTime" class="w-full p-2 border rounded mb-4" required>
            
            <div id="carDetails" class="mb-4 p-4 border rounded bg-gray-50">
                <h3 class="font-semibold">Selected Car Details:</h3>
                <p id="carName" class="text-gray-700">Car Name: </p>
                <p id="carPrice" class="text-gray-700">Price: </p>
            </div>
            
            <button type="button" onclick="goToPayment()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Proceed to Payment</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const params = new URLSearchParams(window.location.search);
            document.getElementById("carName").textContent = "Car Name: " + (params.get("carName") || "Unknown");
            document.getElementById("carPrice").textContent = "Price: " + (params.get("carPrice") || "Unknown");
        });

        function goToPayment() {
            const fullName = document.getElementById("fullName").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const pickupLocation = document.getElementById("pickupLocation").value;
            const dropLocation = document.getElementById("dropLocation").value;
            const pickupDateTime = document.getElementById("pickupDateTime").value;
            const dropDateTime = document.getElementById("dropDateTime").value;
            
            if (!fullName || !email || !phone || !pickupLocation || !dropLocation || !pickupDateTime || !dropDateTime) {
                alert("Please fill in all fields.");
                return;
            }
            
            window.location.href = "payment.html?carName=" + encodeURIComponent(document.getElementById("carName").textContent) + "&carPrice=" + encodeURIComponent(document.getElementById("carPrice").textContent);
        }
    </script>
</body>
</html>
